<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nabung Bareng</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container mt-4" style="max-width: 500px;">
        <h3 class="text-center mb-4">Aplikasi Nabung Bareng 💸</h3>
        
        <div class="card shadow-sm mb-4 border-0">
            <div class="card-body text-center bg-white rounded">
                <h6 class="text-muted">Total Terkumpul:</h6>
                <h2 class="text-success mb-0">Rp {{ "{:,.0f}".format(total).replace(',', '.') }}</h2>
            </div>
        </div>

        <div class="card shadow-sm mb-4 border-0">
            <div class="card-body">
                <form action="/tambah" method="POST">
                    <div class="mb-3">
                        <label class="form-label text-muted small">Siapa yang nabung?</label>
                        <select name="nama" class="form-select" required>
                            <option value="Ikhsan">Ikhsan</option>
                            <option value="Febri">Febri</option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label class="form-label text-muted small">Jumlah (Rp)</label>
                        <input type="number" name="jumlah" class="form-control" placeholder="Contoh: 15000" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label text-muted small">Tipe Tabungan</label>
                        <select name="tipe" class="form-select">
                            <option value="Harian">Harian</option>
                            <option value="Mingguan">Mingguan</option>
                            <option value="Bulanan">Bulanan</option>
                        </select>
                    </div>
                    <button type="submit" class="btn btn-primary w-100 rounded-pill">Catat Tabungan</button>
                </form>
            </div>
        </div>

        <div class="card shadow-sm border-0">
            <div class="card-body p-0">
                <div class="table-responsive">
                    <table class="table table-hover mb-0 text-center" style="font-size: 0.9rem;">
                        <thead class="table-light">
                            <tr>
                                <th>Tanggal</th>
                                <th>Nama</th>
                                <th>Jumlah</th>
                            </tr>
                        </thead>
                        <tbody>
                            {% for row in data %}
                            <tr>
                                <td class="text-muted">{{ row[4] }}</td>
                                <td><strong>{{ row[1] }}</strong><br><small class="text-muted">{{ row[3] }}</small></td>
                                <td class="text-success fw-bold">Rp {{ "{:,.0f}".format(row[2]).replace(',', '.') }}</td>
                            </tr>
                            {% endfor %}
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
